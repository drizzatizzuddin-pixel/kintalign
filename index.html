<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plaque Score Generator (Final)</title>

<style>
body { 
    font-family: Arial, sans-serif; 
    margin: 10px; 
    user-select: none; 
    text-align: center; 
}

#score {
    margin-top: 20px; 
    font-size: 18px; 
    font-weight: bold;
    color: darkred; 
}

.dental-chart-container {
    width: 100%;
    max-width: 900px;
    margin: 20px auto; 
    display: grid;
    gap: 10px; 
    justify-content: center; 
    overflow: hidden;
}

.arch { display: flex; justify-content: center; }
.quadrant { display: flex; padding: 0 2px; }
.quadrant.right { flex-direction: row-reverse; }

.tooth {
    position: relative;
    width: min(8vw, 64px); 
    height: min(8vw, 64px); 
    margin: 0 1px;
    border: 1px solid black; 
    display: grid;
    grid-template-columns: repeat(4, 1fr); 
    grid-template-rows: repeat(4, 1fr);
}

/* surfaces */
.surface { background: white; }

/* posterior */
.tooth.posterior .M { grid-area: 1 / 1 / 5 / 2; border-right:1px solid black;}
.tooth.posterior .D { grid-area: 1 / 4 / 5 / 5; border-left:1px solid black;}
.tooth.posterior .B { grid-area: 1 / 2 / 2 / 4; border-bottom:1px solid black;}
.tooth.posterior .O { grid-area: 2 / 2 / 4 / 4; border-bottom:1px solid black;}
.tooth.posterior .L { grid-area: 4 / 2 / 5 / 4;}

/* anterior */
.tooth.anterior .M { grid-area: 1 / 1 / 5 / 2; border-right:1px solid black;}
.tooth.anterior .D { grid-area: 1 / 4 / 5 / 5; border-left:1px solid black;}
.tooth.anterior .B { grid-area: 1 / 2 / 3 / 4; border-bottom:1px solid black;}
.tooth.anterior .L { grid-area: 3 / 2 / 5 / 4;}

.surface.plaque { background:#990099; }

.tooth.missing { opacity:0.5; }
.tooth.missing .surface { background:#aaa !important; }

.number-label {
    position:absolute;
    font-size:9px;
    width:100%;
}
.upper-arch .number-label { top:-12px; }
.lower-arch .number-label { bottom:-12px; }

button {
    margin-top:20px;
    padding:8px 16px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>Dental Plaque Chart</h2>

<div class="dental-chart-container">
    <div class="arch upper-arch">
        <div class="quadrant right" id="q1"></div>
        <div class="quadrant left" id="q2"></div>
    </div>
    <div class="arch lower-arch">
        <div class="quadrant right" id="q4"></div>
        <div class="quadrant left" id="q3"></div>
    </div>
</div>

<button onclick="generateScore()">Generate Score</button>
<h3 id="score">Plaque Score: 0%</h3>

<p>Tap = Plaque | Hold = Missing (hold again = undo)</p>

<script>
const toothData = {
    q1:[11,12,13,14,15,16,17,18],
    q2:[21,22,23,24,25,26,27,28],
    q3:[31,32,33,34,35,36,37,38],
    q4:[41,42,43,44,45,46,47,48]
};

const posterior=[14,15,16,17,18,24,25,26,27,28,34,35,36,37,38,44,45,46,47,48];
const surfPost=['M','D','B','L','O'];
const surfAnt=['M','D','B','L'];

let validSurfaces=0;

function isPost(t){ return posterior.includes(t); }
function getSurf(t){ return isPost(t)?surfPost:surfAnt; }

function generateChart(){
    document.querySelectorAll('.quadrant').forEach(q=>{
        toothData[q.id].forEach(t=>{
            const tooth=document.createElement('div');
            tooth.className=`tooth ${isPost(t)?'posterior':'anterior'}`;
            tooth.id=`t${t}`;

            const label=document.createElement('span');
            label.className='number-label';
            label.textContent=t;
            tooth.appendChild(label);

            let pressTimer;
            let isHolding=false;

            getSurf(t).forEach(s=>{
                const d=document.createElement('div');
                d.className=`surface ${s}`;

                d.onclick=()=>{
                    if(!isHolding){
                        d.classList.toggle('plaque');
                    }
                };

                tooth.appendChild(d);
            });

            // HOLD detection (PC + Mobile)
            tooth.addEventListener("mousedown", (e)=>{
                if(e.button!==0) return;
                isHolding=false;

                pressTimer=setTimeout(()=>{
                    toggleMissing(t);
                    isHolding=true;
                },500);
            });

            tooth.addEventListener("mouseup", ()=>clearTimeout(pressTimer));
            tooth.addEventListener("mouseleave", ()=>clearTimeout(pressTimer));

            tooth.addEventListener("touchstart", ()=>{
                isHolding=false;
                pressTimer=setTimeout(()=>{
                    toggleMissing(t);
                    isHolding=true;
                },500);
            });

            tooth.addEventListener("touchend", ()=>clearTimeout(pressTimer));

            validSurfaces+=getSurf(t).length;
            q.appendChild(tooth);
        });
    });
}

function toggleMissing(t){
    const tooth=document.getElementById(`t${t}`);
    const count=getSurf(t).length;

    if(tooth.classList.contains('missing')){
        tooth.classList.remove('missing');
        validSurfaces+=count;
    } else {
        tooth.querySelectorAll('.surface').forEach(s=>s.classList.remove('plaque'));
        tooth.classList.add('missing');
        validSurfaces-=count;
    }
}

function generateScore(){
    const plaque=document.querySelectorAll('.plaque').length;
    const percent=validSurfaces?Math.round((plaque/validSurfaces)*100):0;
    document.getElementById('score').innerText=`Plaque Score: ${percent}%`;
}

generateChart();
</script>

</body>
</html>
