<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KintAlign - Plaque Score Calculator</title>
<style>
/* --- 1. Global Styles --- */
body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    margin: 10px; 
    user-select: none; 
    text-align: center;
    background-color: #fff;
    color: #333;
}

h2 {
    font-size: 1.1rem;
    margin-bottom: 15px;
}

/* --- 2. Chart Layout (REFIXED FOR MOBILE) --- */
.dental-chart-container {
    width: 100%;
    margin: 25px auto 0; 
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: auto; 
    padding-bottom: 20px;
}

.arch {
    display: flex;
    justify-content: center;
    min-width: max-content; 
    margin-bottom: 30px;
}

.quadrant {
    display: flex; 
    padding: 0 1px; 
}

/* CSS Row-Reverse untuk Quadrant 1 (Atas Kanan) dan 4 (Bawah Kanan) */
/* Ini supaya 11/41 berada di tengah (midline) */
.quadrant.right {
    flex-direction: row-reverse;
}

/* --- 3. Tooth Styling --- */
.tooth {
    position: relative;
    width: 40px; 
    height: 40px; 
    margin: 0 1px;
    box-sizing: border-box; 
    border: 1px solid #444; 
    cursor: pointer;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr; 
    grid-template-rows: 1fr 1fr 1fr 1fr;
    background: white; 
}

/* --- 4. Surface Styling --- */
.surface {
    position: relative;
    background: white;
    cursor: pointer;
    box-sizing: border-box;
    transition: background-color 0.1s;
    border: 0; 
    z-index: 2; 
}

/* POSTERIOR (5 Surfaces) */
.tooth.posterior .surface.M { grid-area: 1 / 1 / 5 / 2; border-right: 1px solid #ccc; } 
.tooth.posterior .surface.D { grid-area: 1 / 4 / 5 / 5; border-left: 1px solid #ccc; }
.tooth.posterior .surface.B { grid-area: 1 / 2 / 2 / 4; border-bottom: 1px solid #ccc; }
.tooth.posterior .surface.O { grid-area: 2 / 2 / 4 / 4; border-bottom: 1px solid #ccc; }
.tooth.posterior .surface.L { grid-area: 4 / 2 / 5 / 4; }

/* ANTERIOR (4 Surfaces) */
.tooth.anterior .surface.M { grid-area: 1 / 1 / 5 / 2; border-right: 1px solid #ccc; } 
.tooth.anterior .surface.D { grid-area: 1 / 4 / 5 / 5; border-left: 1px solid #ccc; }
.tooth.anterior .surface.B { grid-area: 1 / 2 / 3 / 4; border-bottom: 1px solid #ccc; }
.tooth.anterior .surface.L { grid-area: 3 / 2 / 5 / 4; }

/* Status Colors */
.surface.plaque { background-color: #990099; } /* KintAlign Purple */
.tooth.missing { opacity: 0.25; }
.tooth.missing .surface { background-color: #d1d1d1 !important; }

/* Labels */
.number-label {
    position: absolute;
    font-size: 9px;
    width: 100%;
    text-align: center;
    font-weight: bold;
    z-index: 10;
}
.upper-arch .number-label { top: -16px; }
.lower-arch .number-label { bottom: -16px; }

/* --- 5. UI Elements --- */
#generateButton {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    background-color: #2e7d32;
    color: white;
    border: none;
    border-radius: 6px;
}

#score {
    margin-top: 15px; 
    font-size: 20px; 
    font-weight: bold;
    color: #b71c1c; 
}

.instruction {
    font-size: 11px;
    color: #777;
    margin-top: 10px;
    line-height: 1.4;
}

/* Mobile Tweak */
@media screen and (max-width: 480px) {
    .tooth { width: 35px; height: 35px; }
}
</style>
</head>
<body>

<h2>Plaque Score Calculator</h2>

<div class="dental-chart-container">
    <div class="arch upper-arch">
        <div class="quadrant right" id="q1"></div>
        <div class="quadrant left" id="q2"></div>
    </div>
    <div class="arch lower-arch">
        <div class="quadrant right" id="q4"></div>
        <div class="quadrant left" id="q3"></div>
    </div>
</div>

<button id="generateButton" onclick="generateScore()">Generate Plaque Score</button>
<h3 id="score">Score: 0%</h3>

<div class="instruction">
    Klik kotak untuk <strong>Plaque</strong>.<br>
    Right-click (Desktop) atau Long Press (Mobile) untuk <strong>Missing Tooth</strong>.
</div>

<script>
// Susunan FDI yang betul untuk Dental Chart View
const toothData = {
    'q1': [11, 12, 13, 14, 15, 16, 17, 18], // Midline -> Distal (Reverse by CSS)
    'q2': [21, 22, 23, 24, 25, 26, 27, 28], // Midline -> Distal
    'q3': [31, 32, 33, 34, 35, 36, 37, 38], // Midline -> Distal
    'q4': [41, 42, 43, 44, 45, 46, 47, 48]  // Midline -> Distal (Reverse by CSS)
};

const posteriorTeeth = [14, 15, 16, 17, 18, 24, 25, 26, 27, 28, 34, 35, 36, 37, 38, 44, 45, 46, 47, 48];
const surfacesPost = ['M', 'D', 'B', 'L', 'O']; 
const surfacesAnt = ['M', 'D', 'B', 'L'];      

let validSurfacesCount = 0; 

function isPosterior(tNum) { return posteriorTeeth.includes(tNum); }
function getSurfacesForTooth(tNum) { return isPosterior(tNum) ? surfacesPost : surfacesAnt; }

function generateChart() {
    Object.keys(toothData).forEach(quadId => {
        const quad = document.getElementById(quadId);
        const teeth = toothData[quadId];

        teeth.forEach(tNum => {
            const isPost = isPosterior(tNum);
            const surfaces = getSurfacesForTooth(tNum);
            
            const toothDiv = document.createElement('div');
            toothDiv.className = `tooth ${isPost ? 'posterior' : 'anterior'}`;
            toothDiv.id = `t${tNum}`;
            
            const numLabel = document.createElement('span');
            numLabel.className = 'number-label';
            numLabel.textContent = tNum;
            toothDiv.appendChild(numLabel);

            surfaces.forEach(key => {
                const surfaceDiv = document.createElement('div');
                surfaceDiv.className = `surface ${key}`;
                surfaceDiv.onclick = () => {
                    if(!toothDiv.classList.contains('missing')) {
                        surfaceDiv.classList.toggle('plaque');
                    }
                };
                toothDiv.appendChild(surfaceDiv);
            });

            // Handle Right Click / Long Press for Missing
            toothDiv.oncontextmenu = (e) => {
                e.preventDefault(); 
                toggleMissing(tNum);
            };

            validSurfacesCount += surfaces.length;
            quad.appendChild(toothDiv);
        });
    });
    generateScore();
}

function generateScore() {
    const plaqueCount = document.querySelectorAll('.surface.plaque').length;
    let percent = validSurfacesCount === 0 ? 0 : Math.round((plaqueCount / validSurfacesCount) * 100);
    document.getElementById('score').innerText = `Score: ${percent}%`;
}

function toggleMissing(toothNum) {
    const toothDiv = document.getElementById(`t${toothNum}`);
    const surfaceCount = getSurfacesForTooth(toothNum).length;
    
    if (toothDiv.classList.contains('missing')) {
        toothDiv.classList.remove('missing');
        validSurfacesCount += surfaceCount; 
    } else {
        const surfaces = toothDiv.querySelectorAll('.surface');
        surfaces.forEach(s => s.classList.remove('plaque'));
        toothDiv.classList.add('missing');
        validSurfacesCount -= surfaceCount; 
    }
}

generateChart();
</script>
</body>
</html>
