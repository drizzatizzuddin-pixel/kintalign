<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plaque Score Generator (4x4 Grid Final)</title>
<style>
/* --- 1. Global Styles --- */
body { 
    font-family: Arial, sans-serif; 
    margin: 20px; 
    user-select: none; 
    text-align: center; 
}
h2, #score { 
    text-align: center; 
}
#score {
    margin-top: 20px; 
    font-size: 18px; 
    font-weight: bold;
    color: darkred; 
}

/* --- 2. Chart Layout & Centering (FIXED FOR MOBILE) --- */
.dental-chart-container {
    max-width: 900px;
    margin: 40px auto 0; 
    display: grid;
    gap: 20px; 
    padding: 0 10px;
    justify-content: center; 
    
    /* TAMBAHAN BARU: Bagi boleh scroll kalau skrin kecik */
    overflow-x: auto; 
    white-space: nowrap;
    padding-bottom: 20px; /* Ruang untuk scrollbar */
}

.arch {
    display: flex;
    justify-content: center; 
    min-width: max-content; /* Biar dia tak 'wrap' ke bawah */
}
.quadrant {
    display: flex; 
    padding: 0 5px; 
}
.quadrant.right {
    flex-direction: row-reverse;
}

/* --- 3. Tooth Styling (4x4 Grid) --- */
.tooth {
    position: relative;
    width: 64px; 
    height: 64px; 
    margin: 0 2px;
    box-sizing: border-box; 
    border: 1px solid black; 
    cursor: pointer;
    
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr; 
    grid-template-rows: 1fr 1fr 1fr 1fr;
    background: white; 
}

/* --- 4. Surface Styling & Demarcation --- */
.surface {
    position: relative;
    background: white;
    cursor: pointer;
    box-sizing: border-box;
    transition: background-color 0.1s;
    border: 0; 
    z-index: 2; 
}

/* POSTERIOR */
.tooth.posterior .surface.M { grid-area: 1 / 1 / 5 / 2; border-right: 1px solid black; } 
.tooth.posterior .surface.D { grid-area: 1 / 4 / 5 / 5; border-left: 1px solid black; }
.tooth.posterior .surface.B { grid-area: 1 / 2 / 2 / 4; border-bottom: 1px solid black; }
.tooth.posterior .surface.O { grid-area: 2 / 2 / 4 / 4; border-bottom: 1px solid black; }
.tooth.posterior .surface.L { grid-area: 4 / 2 / 5 / 4; }

/* ANTERIOR */
.tooth.anterior .surface.M { grid-area: 1 / 1 / 5 / 2; border-right: 1px solid black; } 
.tooth.anterior .surface.D { grid-area: 1 / 4 / 5 / 5; border-left: 1px solid black; }
.tooth.anterior .surface.B { grid-area: 1 / 2 / 3 / 4; border-bottom: 1px solid black; }
.tooth.anterior .surface.L { grid-area: 3 / 2 / 5 / 4; }

/* --- 5. Plaque Marking & Missing --- */
.surface.plaque { background-color: #990099; }
.tooth.missing { opacity: 0.5; }
.tooth.missing .surface { background-color: #a9a9a9 !important; }

/* --- 6. Numbering --- */
.number-label {
    position: absolute;
    font-size: 10px;
    width: 100%;
    text-align: center;
    line-height: 1;
    font-weight: normal;
    z-index: 10;
}
.upper-arch .number-label { top: -15px; }
.lower-arch .number-label { bottom: -15px; }

/* --- Button Styling --- */
#generateButton {
    margin-top: 30px;
    padding: 10px 20px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
}
</style>
</head>
<body>

<h2>Dental Plaque Chart (Click to Mark Plaque)</h2>

<div class="dental-chart-container">
    <div class="arch upper-arch">
        <div class="quadrant right" id="q1"></div>
        <div class="quadrant left" id="q2"></div>
    </div>
    <div class="arch lower-arch">
        <div class="quadrant right" id="q4"></div>
        <div class="quadrant left" id="q3"></div>
    </div>
</div>

<button id="generateButton" onclick="generateScore()">Generate Plaque Score</button>
<h3 id="score">Plaque Score: 0%</h3>

<div style="text-align: center; margin-top: 15px; font-size: 14px;">
    **Right-click** on a tooth to toggle its **Missing** status.
</div>

<script>
const toothData = {
    'q1': [11, 12, 13, 14, 15, 16, 17, 18], 
    'q2': [21, 22, 23, 24, 25, 26, 27, 28],
    'q3': [31, 32, 33, 34, 35, 36, 37, 38],
    'q4': [41, 42, 43, 44, 45, 46, 47, 48] 
};

const posteriorTeeth = [14, 15, 16, 17, 18, 24, 25, 26, 27, 28, 34, 35, 36, 37, 38, 44, 45, 46, 47, 48];
const surfacesPost = ['M', 'D', 'B', 'L', 'O']; 
const surfacesAnt = ['M', 'D', 'B', 'L'];      

let validSurfaces = 0; 

function isPosterior(tNum) { return posteriorTeeth.includes(tNum); }
function getSurfacesForTooth(tNum) { return isPosterior(tNum) ? surfacesPost : surfacesAnt; }

function generateChart() {
    const quadrants = document.querySelectorAll('.quadrant');
    quadrants.forEach(quad => {
        const teeth = toothData[quad.id];
        teeth.forEach(tNum => {
            const isPost = isPosterior(tNum);
            const surfaces = getSurfacesForTooth(tNum);
            const toothDiv = document.createElement('div');
            toothDiv.className = `tooth ${isPost ? 'posterior' : 'anterior'}`;
            toothDiv.id = `t${tNum}`;
            const numLabel = document.createElement('span');
            numLabel.className = 'number-label';
            numLabel.textContent = tNum;
            toothDiv.appendChild(numLabel);
            surfaces.forEach(key => {
                const surfaceDiv = document.createElement('div');
                surfaceDiv.className = `surface ${key}`;
                surfaceDiv.id = `${tNum}-${key}`;
                surfaceDiv.onclick = () => surfaceDiv.classList.toggle('plaque');
                toothDiv.appendChild(surfaceDiv);
            });
            toothDiv.oncontextmenu = (e) => {
                e.preventDefault(); 
                toggleMissing(tNum);
            };
            validSurfaces += surfaces.length;
            quad.appendChild(toothDiv);
        });
    });
    generateScore();
}

function generateScore() {
    const surfacesWithPlaque = document.querySelectorAll('.surface.plaque').length;
    let percent = validSurfaces === 0 ? 0 : Math.round((surfacesWithPlaque / validSurfaces) * 100);
    document.getElementById('score').innerText = `Plaque Score: ${percent}%`;
}

function toggleMissing(toothNum) {
    const toothDiv = document.getElementById(`t${toothNum}`);
    const surfaceCount = getSurfacesForTooth(toothNum).length;
    if (toothDiv.classList.contains('missing')) {
        toothDiv.classList.remove('missing');
        validSurfaces += surfaceCount; 
    } else {
        const surfaces = toothDiv.querySelectorAll('.surface');
        surfaces.forEach(s => s.classList.remove('plaque'));
        toothDiv.classList.add('missing');
        validSurfaces -= surfaceCount; 
    }
}
generateChart();
</script>
</body>
</html>
